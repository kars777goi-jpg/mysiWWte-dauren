<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>8 НАУРЫЗ!</title>
</head>

<body>
    <audio id="bgMusic" loop>
        <source src="assets/audio/music.mp3" type="audio/mpeg">
        Браузеріңіз аудионы қолдамайды.
    </audio>

    <div class="valentines-day">
        <div class="envelope"></div>
        <div class="heart"></div>
        <div class="text">Қыздар күніңізбен!<br>8 НАУРЫЗ!</div>
        <div class="front"></div>
    </div>

    <div id="card">
        <div class="side one">
            <i class="fas fa-heart"></i>
        </div>
        <div class="side two">
            <h2>🌷🌷🌷</h2>
            <p>Құрметті қыздар!,</p>
            <p>
                Сіздерді 8 наурыз – Халықаралық әйелдер күніне арналған ерекше кешке шақырамыз! 💐
            </p>
            <p>
                <strong>Күні:</strong> 04 наурыз 2026 жыл<br>
                <strong>Уақыты:</strong> 14:00<br>
                <strong>Өтетін орны:</strong> Антикафе
            </p>
            <p>
                Махаббатпен,<br>
                ұлдар
            </p>
        </div>
    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js'></script>
    <script src="assets/js/main.js"></script>

    <script>
        $(document).ready(function() {
            var audio = document.getElementById('bgMusic');

            // Қолданушы экранды бір рет басса, музыка ойнай бастайды
            $(document).one('click', function() {
                audio.play().catch(function(error) {
                    console.log("Музыканы қосу мүмкін болмады:", error);
                });
            });

            // Конвертті немесе хатты басқанда музыканы қайта тексеру
            $('.valentines-day, #card').click(function() {
                if (audio.paused) {
                    audio.play();
                }
            });
        });
    </script>
</body>

</html>
